<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Operation Sole Survivor | Marcos &amp; Muscles</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e14; --panel:#111826; --panel2:#0d1220; --line:#233047; --line2:#152034;
  --gold:#d4af37; --gold-dim:#8a7328; --cyan:#22d3ee; --red:#ff4d4d; --green:#3ddc84;
  --txt:#e8ecf1; --dim:#7c8aa3; --dimmer:#4a5875;
  --disp:'Bebas Neue',sans-serif; --mono:'JetBrains Mono',monospace;
}
.bracket{position:absolute;width:14px;height:14px;pointer-events:none;}
.bracket.tl{top:-1px;left:-1px;border-top:2px solid var(--gold-dim);border-left:2px solid var(--gold-dim);}
.bracket.br{bottom:-1px;right:-1px;border-bottom:2px solid var(--gold-dim);border-right:2px solid var(--gold-dim);}
.ccard.inl .bracket{border-color:rgba(34,211,238,.5);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt);font-family:var(--mono);font-size:14px;padding-bottom:90px;line-height:1.6;}
a{color:var(--gold);text-decoration:none;}
a:hover{color:#e9c65a;}
body::before{content:'';position:fixed;inset:0;background:
  linear-gradient(rgba(212,175,55,.02) 1px,transparent 1px) 0 0/100% 28px,
  linear-gradient(90deg,rgba(212,175,55,.02) 1px,transparent 1px) 0 0/28px 100%;
  pointer-events:none;z-index:1;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(212,175,55,.05),transparent 60%),radial-gradient(ellipse at 50% 100%,rgba(0,0,0,.55),transparent 55%);pointer-events:none;z-index:1;}
::selection{background:var(--gold);color:#000;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes sweep{0%{background-position:-200px 0}100%{background-position:200px 0}}
.blink{animation:pulse 1.4s ease-in-out infinite;}

/* HEADER */
.hdr{text-align:center;padding:38px 20px 22px;border-bottom:1px solid var(--gold-dim);box-shadow:0 1px 0 rgba(212,175,55,.15);position:relative;z-index:2;}
.hdr h1{font-family:var(--disp);font-size:64px;letter-spacing:5px;color:var(--gold);text-shadow:0 0 26px rgba(212,175,55,.3);line-height:.95;margin-top:6px;}
.hdr-top{font-family:var(--mono);font-size:11px;letter-spacing:7px;color:var(--dim);}
.hdr-sub{font-size:12px;letter-spacing:3px;color:var(--dim);margin-top:10px;}

/* ALARM */
.alarm{background:repeating-linear-gradient(135deg,rgba(255,77,77,.16),rgba(255,77,77,.16) 10px,rgba(255,77,77,.05) 10px,rgba(255,77,77,.05) 20px);border-top:1px solid var(--red);border-bottom:1px solid var(--red);color:var(--red);font-family:var(--disp);font-size:20px;letter-spacing:4px;text-align:center;padding:11px;animation:pulse 1s ease-in-out infinite;}

/* TABS */
.tabs{display:flex;justify-content:center;gap:4px;position:sticky;top:0;z-index:50;background:rgba(10,14,20,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:0 14px;}
.tab{flex:0 1 200px;background:none;border:none;color:var(--dim);font-family:var(--mono);font-size:12px;letter-spacing:1.5px;padding:16px 4px;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;}
.tab:hover{color:var(--txt);}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab:active{background:rgba(212,175,55,.06);}

main{position:relative;z-index:2;max-width:780px;margin:0 auto;padding:0 8px;}

/* SECTION */
.sec{padding:22px 14px;border-bottom:1px solid var(--line2);}
.sec-ttl{font-family:var(--disp);font-size:17px;letter-spacing:2.5px;color:var(--gold);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--line);box-shadow:0 2px 0 -1px rgba(212,175,55,.15);text-shadow:0 0 10px rgba(212,175,55,.2);}
.sec-sub{font-size:11px;color:var(--dim);margin-top:-6px;margin-bottom:10px;}

/* CREW SCORE CARDS */
.crewgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.ccard{border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),var(--panel2));padding:16px 14px;position:relative;box-shadow:0 3px 14px rgba(0,0,0,.4);transition:transform .18s,border-color .18s;}
.ccard:hover{transform:translateY(-2px);}
.ccard::before{content:'';position:absolute;top:6px;left:6px;right:6px;bottom:6px;border:1px solid rgba(212,175,55,.08);pointer-events:none;}
.ccard.fam{border-color:rgba(212,175,55,.35);}
.ccard.inl{border-color:rgba(34,211,238,.35);}
.ck-lbl{font-family:var(--disp);font-size:17px;letter-spacing:1.5px;margin-bottom:2px;}
.ccard.fam .ck-lbl{color:var(--gold);}
.ccard.inl .ck-lbl{color:var(--cyan);}
.ck-phase{font-size:11px;color:var(--dim);letter-spacing:1px;margin-bottom:8px;}
.ck-phname{font-family:var(--disp);font-size:24px;letter-spacing:1px;color:var(--txt);margin-bottom:10px;}
.barwrap{height:10px;background:var(--panel2);border:1px solid var(--line);margin-bottom:6px;position:relative;overflow:hidden;}
.barwrap::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 9%,rgba(0,0,0,.4) 9%,rgba(0,0,0,.4) calc(9% + 1px));pointer-events:none;}
.bar{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));position:relative;z-index:0;}
.ccard.inl .bar{background:linear-gradient(90deg,#0e6577,var(--cyan));}
.ck-nums{font-size:12px;color:var(--dim);}
.ck-nums b{color:var(--txt);}
.ck-getaway{margin-top:8px;border:1px solid var(--red);background:rgba(255,77,77,.08);padding:6px;text-align:center;}
.ck-getaway .gt-lbl{font-size:10px;letter-spacing:1px;color:var(--red);}
.ck-getaway .gt-clock{font-family:var(--disp);font-size:20px;color:var(--red);}
.ck-outcome{margin-top:8px;text-align:center;font-family:var(--disp);font-size:17px;letter-spacing:1px;padding:6px;}
.ck-outcome.escaped{color:var(--green);border:1px solid var(--green);background:rgba(61,220,132,.08);}
.ck-outcome.captured{color:var(--red);border:1px solid var(--red);background:rgba(255,77,77,.08);}

/* CASE LOG */
.log-e{border-left:2px solid var(--line);padding:6px 0 6px 10px;margin-bottom:4px;font-size:12px;color:var(--dim);}
.log-e b{color:var(--txt);}
.log-e .ts{font-size:10px;color:var(--dimmer);}

/* CREW PAGE */
.gate{border:1px dashed var(--gold-dim);padding:16px;text-align:center;margin-bottom:14px;}
.gate-lbl{font-family:var(--disp);font-size:15px;letter-spacing:2px;color:var(--gold);margin-bottom:8px;}
.gate input{width:140px;text-align:center;letter-spacing:6px;font-size:18px;background:var(--panel2);color:var(--txt);border:1px solid var(--line);padding:8px;font-family:var(--mono);}
.gate button{display:block;margin:10px auto 0;background:var(--gold-dim);color:#000;border:none;padding:9px 18px;font-family:var(--disp);letter-spacing:1px;cursor:pointer;}
.unlocked-tag{display:inline-block;font-size:10px;color:var(--green);letter-spacing:1px;border:1px solid var(--green);padding:2px 8px;margin-bottom:10px;}

.crewname-row{display:flex;gap:8px;align-items:center;margin-bottom:12px;}
.crewname-row input{flex:1;background:var(--panel2);color:var(--txt);border:1px solid var(--line);padding:8px;font-family:var(--disp);font-size:16px;letter-spacing:1px;}
.crewname-row button{background:var(--gold-dim);color:#000;border:none;padding:8px 12px;font-family:var(--mono);font-size:11px;cursor:pointer;}

.roster{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pcard{border:1px solid var(--line);background:var(--panel);padding:8px;text-align:center;}
.pp-w{width:60px;height:60px;margin:0 auto 8px;position:relative;}
.pp-w::before{content:'';position:absolute;inset:-4px;border:1px dashed var(--gold-dim);border-radius:50%;}
.pp{width:60px;height:60px;border-radius:50%;object-fit:cover;display:block;background:#0a0e14;border:2px solid var(--gold-dim);filter:grayscale(15%) sepia(6%) contrast(1.05);}
.p-name{font-family:var(--disp);font-size:14px;letter-spacing:1px;color:var(--txt);}
.p-role{font-size:10px;color:var(--gold);letter-spacing:1px;margin-top:2px;}
.p-stats{font-size:11px;color:var(--dim);margin-top:4px;line-height:1.6;}

.roleform select{width:100%;background:var(--panel2);color:var(--txt);border:1px solid var(--line);padding:8px;margin-bottom:6px;font-family:var(--mono);}
.roleform button{width:100%;background:var(--gold-dim);color:#000;border:none;padding:9px;font-family:var(--disp);letter-spacing:1px;cursor:pointer;margin-top:4px;}

.board{border:1px solid var(--line);background:#000;padding:10px;max-height:280px;overflow-y:auto;margin-bottom:10px;}
.board-e{font-size:12px;color:var(--green);padding:4px 0;border-bottom:1px dotted var(--line2);}
.board-e .who{color:var(--cyan);}
.board-e .ts{color:var(--dimmer);font-size:10px;}
.board-form{display:flex;gap:6px;}
.board-form input{flex:1;background:var(--panel2);color:var(--txt);border:1px solid var(--line);padding:8px;font-family:var(--mono);font-size:13px;}
.board-form select{flex:0 0 auto;background:var(--panel2);color:var(--txt);border:1px solid var(--line);padding:8px;font-family:var(--mono);font-size:13px;max-width:112px;}
.board-form button{background:var(--gold-dim);color:#000;border:none;padding:8px 14px;font-family:var(--mono);cursor:pointer;}
.charct{font-size:10px;color:var(--dimmer);text-align:right;margin-top:2px;}

.lootbox{border:1px solid var(--red);background:rgba(255,77,77,.06);padding:12px;text-align:center;}
.lootbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.lootbtns button{padding:12px 6px;font-family:var(--disp);font-size:14px;letter-spacing:1px;cursor:pointer;border:1px solid var(--red);background:none;color:var(--txt);}
.lootbtns button:active{background:var(--red);color:#000;}
.loot-locked{font-family:var(--disp);font-size:18px;color:var(--gold);text-align:center;padding:10px;}

/* CASE FILE */
.casefile{border:2px solid var(--gold-dim);padding:14px;}
.stamp{font-family:var(--disp);font-size:13px;letter-spacing:2px;color:var(--red);border:2px solid var(--red);display:inline-block;padding:3px 10px;transform:rotate(-3deg);margin-bottom:10px;}
.award{border-left:2px solid var(--gold);padding:6px 0 6px 10px;margin-bottom:6px;font-size:12px;}
.award b{color:var(--gold);}

/* FAB & ADMIN */
.fab{position:fixed;bottom:20px;right:16px;z-index:1000;width:52px;height:52px;background:var(--panel);border:2px solid var(--gold-dim);color:var(--gold);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.fab:active{background:var(--gold);color:#000;}
.aov{display:none;position:fixed;inset:0;background:rgba(5,7,11,.98);z-index:2000;overflow-y:auto;padding:16px;}
.aov.open{display:block;}
.ahdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--line);}
.att{font-family:var(--disp);font-size:18px;color:var(--gold);letter-spacing:1px;}
.acl{font-family:var(--mono);font-size:12px;color:var(--red);cursor:pointer;background:none;border:1px solid var(--red);padding:6px 10px;}
.as{border:1px solid var(--line);padding:11px;margin-bottom:10px;background:var(--panel);}
.ast{font-family:var(--disp);font-size:14px;color:var(--gold);margin-bottom:9px;letter-spacing:1px;}
.ar{margin-bottom:9px;}
.al{font-size:10px;color:var(--dim);display:block;margin-bottom:3px;letter-spacing:1px;}
.ai,.asel{width:100%;background:#000;color:var(--txt);border:1px solid var(--line);padding:9px;font-family:var(--mono);font-size:15px;}
.ai:focus,.asel:focus{outline:none;border-color:var(--gold);}
.ab{width:100%;padding:11px;background:var(--gold-dim);color:#000;border:none;font-family:var(--disp);font-size:14px;letter-spacing:1px;cursor:pointer;margin-top:5px;}
.ab:active{background:var(--gold);}
.ab.danger{background:none;border:1px solid var(--red);color:var(--red);}
.ab.warn{background:none;border:1px solid var(--cyan);color:var(--cyan);}
.ab:disabled{opacity:.4;cursor:not-allowed;}
.am{font-size:12px;text-align:center;padding:7px;margin-top:6px;min-height:20px;}
.am.ok{color:var(--green);}.am.err{color:var(--red);}
.pins{text-align:center;padding:34px 0;}
.small{font-size:11px;color:var(--dim);}
.bak-row{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding:6px 0;font-size:12px;}
.bak-row button{background:none;border:1px solid var(--cyan);color:var(--cyan);padding:4px 8px;font-size:10px;cursor:pointer;}

/* ===== HOME: VAULT THEME ===== */
.vaultwrap{text-align:center;padding:8px 0 18px;}
.vaultdoor{width:150px;height:150px;margin:0 auto 12px;position:relative;border-radius:50%;
  background:radial-gradient(circle at 50% 38%,#1c2637,#0d1220 72%);
  border:3px solid var(--gold-dim);
  box-shadow:0 0 0 6px var(--panel2),0 0 0 7px var(--line),0 8px 26px rgba(0,0,0,.55),inset 0 0 34px rgba(0,0,0,.7);}
.vd-ring{position:absolute;inset:14px;border-radius:50%;
  background:repeating-conic-gradient(var(--gold-dim) 0 1.4deg,transparent 1.4deg 15deg);opacity:.5;
  -webkit-mask:radial-gradient(circle,transparent 46%,#000 47%);mask:radial-gradient(circle,transparent 46%,#000 47%);}
.vd-handle{position:absolute;top:50%;left:50%;width:74px;height:74px;transform:translate(-50%,-50%);border-radius:50%;
  border:2px solid var(--gold-dim);
  background:
    linear-gradient(var(--gold) 0 0) 50%/5px 100% no-repeat,
    linear-gradient(var(--gold) 0 0) 50%/100% 5px no-repeat,
    linear-gradient(45deg,var(--gold-dim) 0 0) 50%/5px 100% no-repeat,
    radial-gradient(circle,#1c2637 34%,#0d1220 35%);
  box-shadow:0 0 12px rgba(212,175,55,.25),inset 0 0 10px rgba(0,0,0,.6);transform-origin:center;}
.vaultdoor:hover .vd-handle{transform:translate(-50%,-50%) rotate(35deg);transition:transform .6s cubic-bezier(.5,0,.2,1);}
.vault-cap{font-family:var(--mono);font-size:10px;letter-spacing:3px;color:var(--dim);}
#view.vault .crewgrid .ccard{border-color:var(--line);}

/* ===== TEAM PAGES: OPERATIONS CENTER ===== */
.opsbar{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:11px;letter-spacing:2px;
  color:var(--cyan);background:linear-gradient(90deg,rgba(34,211,238,.12),transparent);
  border-left:2px solid var(--cyan);padding:11px 14px;margin-bottom:2px;}
.ops-dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 9px var(--cyan);animation:pulse 1.4s ease-in-out infinite;}
#view.ops .sec{background:
  linear-gradient(rgba(34,211,238,.045) 1px,transparent 1px) 0 0/100% 26px,
  linear-gradient(90deg,rgba(34,211,238,.045) 1px,transparent 1px) 0 0/26px 100%;}
#view.ops .roster{gap:12px;}
.pcard{border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),var(--panel2));padding:12px 10px 10px;text-align:center;position:relative;box-shadow:0 2px 10px rgba(0,0,0,.4);}
.pcard::before{content:'';position:absolute;top:5px;left:5px;width:12px;height:12px;border-top:2px solid var(--gold-dim);border-left:2px solid var(--gold-dim);}
.pcard::after{content:'';position:absolute;bottom:5px;right:5px;width:12px;height:12px;border-bottom:2px solid var(--gold-dim);border-right:2px solid var(--gold-dim);}

/* ===== BURNER PHONE ===== */
.burner{max-width:300px;margin:2px auto 14px;background:linear-gradient(180deg,#1d1d20,#0b0b0d);
  border:2px solid #2c2c31;border-radius:28px;padding:18px 12px 20px;position:relative;
  box-shadow:0 12px 34px rgba(0,0,0,.65),inset 0 0 0 1px rgba(255,255,255,.03);}
.burner::before{content:'';position:absolute;top:9px;left:50%;transform:translateX(-50%);width:46px;height:5px;border-radius:3px;background:#000;box-shadow:inset 0 0 3px rgba(255,255,255,.12);}
.burner-status{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;letter-spacing:1px;color:#6cf07a;padding:4px 6px 6px;}
.burner .board{background:#04140a;border:1px solid #0c3a1c;border-radius:6px;box-shadow:inset 0 0 20px rgba(0,0,0,.8);max-height:220px;}
.burner .board-e{color:#6cf07a;border-bottom:1px dotted #0c3a1c;text-shadow:0 0 6px rgba(108,240,122,.35);}
.burner .board-e .who{color:#bff7c8;}
.burner .board-e .ts{color:#3f7a4f;}
.burner .small{color:#3f7a4f;}

/* ===== VAULT LOADER ===== */
.vault-loader{text-align:center;padding:72px 0;}
.vl-mini{width:112px;height:112px;}
@keyframes spinC{to{transform:rotate(360deg)}}
@keyframes spinH{to{transform:translate(-50%,-50%) rotate(360deg)}}
.vl-mini .vd-ring{animation:spinC 7s linear infinite;}
.vl-mini .vd-handle{animation:spinH 2.6s linear infinite;}

/* ===== PHASE REVEAL ===== */
.decrypt-tag{font-family:var(--mono);font-size:8px;letter-spacing:1px;color:var(--green);border:1px solid rgba(61,220,132,.4);padding:1px 5px;margin-left:6px;vertical-align:middle;}
.log-e.latest{border-left-color:var(--gold);background:linear-gradient(90deg,rgba(212,175,55,.1),transparent);padding-left:12px;}
.log-e.latest b{color:var(--gold);}

/* ===== GETAWAY CLOCK ===== */
.ck-getaway .gt-lbl{font-size:10px;letter-spacing:2px;color:var(--red);margin-bottom:2px;}
.ck-getaway .gt-clock{font-family:var(--mono);font-weight:700;font-size:28px;color:#ff6b6b;letter-spacing:1px;text-shadow:0 0 14px rgba(255,77,77,.4);line-height:1.1;}
.ck-getaway.low{animation:pulse 1s ease-in-out infinite;}
.ck-getaway.low .gt-clock{color:#ff3030;}

/* ===== LOOT CALL ===== */
.lootbox{border:1px solid var(--gold-dim);background:linear-gradient(180deg,var(--panel),var(--panel2));padding:16px;box-shadow:0 3px 14px rgba(0,0,0,.4);}
.loot-choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}
.loot-choice{border:1px solid var(--line);background:var(--panel2);padding:16px 12px;text-align:center;cursor:pointer;position:relative;transition:transform .15s,border-color .15s,box-shadow .15s;}
.loot-choice:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:0 8px 22px rgba(0,0,0,.55);}
.loot-choice.risk:hover{border-color:var(--red);box-shadow:0 8px 22px rgba(255,77,77,.18);}
.loot-choice .lc-name{font-family:var(--disp);font-size:21px;letter-spacing:1px;color:var(--gold);}
.loot-choice.risk .lc-name{color:var(--red);}
.loot-choice .lc-odds{font-family:var(--disp);font-size:36px;color:var(--txt);line-height:1;margin:8px 0 4px;}
.loot-choice .lc-odds small{font-size:14px;color:var(--dim);}
.loot-choice .lc-sub{font-size:9px;color:var(--dim);letter-spacing:1px;}
.loot-lockrow{text-align:center;margin-top:12px;font-size:10px;color:var(--dimmer);letter-spacing:2px;}
.loot-locked-card{text-align:center;padding:22px 14px;border:2px solid var(--gold);background:rgba(212,175,55,.06);box-shadow:inset 0 0 30px rgba(212,175,55,.05);}
.loot-locked-card .llc-stamp{font-family:var(--disp);font-size:30px;color:var(--gold);letter-spacing:2px;text-shadow:0 0 16px rgba(212,175,55,.4);transform:rotate(-3deg);margin:8px 0;}

/* ===== CASE FILE ===== */
.cf-verdict{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:14px 0;}
.cf-crew{border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),var(--panel2));padding:16px 12px;text-align:center;box-shadow:0 3px 14px rgba(0,0,0,.4);}
.cf-crew .cf-name{font-family:var(--disp);font-size:20px;letter-spacing:1px;color:var(--gold);margin-bottom:10px;}
.cf-stamp{font-family:var(--disp);font-size:26px;letter-spacing:2px;padding:5px 12px;display:inline-block;transform:rotate(-4deg);border:3px solid;margin-bottom:10px;}
.cf-stamp.escaped{color:var(--green);border-color:var(--green);text-shadow:0 0 12px rgba(61,220,132,.35);}
.cf-stamp.captured{color:var(--red);border-color:var(--red);text-shadow:0 0 12px rgba(255,77,77,.35);}
.cf-line{font-size:11px;color:var(--dim);margin-top:3px;}
.cf-shots{display:flex;justify-content:center;flex-wrap:wrap;gap:6px;margin-top:12px;}
.cf-shot{width:34px;height:34px;border-radius:50%;object-fit:cover;border:1px solid var(--gold-dim);filter:grayscale(30%) sepia(8%);}
.cf-exhibit{border-left:2px solid var(--gold-dim);padding:6px 0 6px 10px;margin-bottom:6px;font-size:12px;}
.cf-exhibit b{color:var(--gold);}

/* ============ HELPERS ============ */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function pad(n){ return String(n).padStart(2,'0'); }
function localDate(d){ d=d||new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function localStamp(d){ d=d||new Date(); return localDate(d)+'_'+pad(d.getHours())+'-'+pad(d.getMinutes())+'-'+pad(d.getSeconds()); }
function fmtN(n){ return Math.round(n||0).toLocaleString('en-US'); }
function fmtMi(steps){ return (steps/STEPS_PER_MILE).toFixed(1); }
function clamp(n,lo,hi){ return Math.max(lo,Math.min(hi,n)); }

/* ============ STATE SHAPE ============ */
function defCrew(ck){
  return {
    name: CREW_META[ck].label,
    members: CREW_META[ck].members.slice(),
    totalSteps: 0,
    currentPhase: 1,
    phaseProgress: 0,
    getawayStartedAt: null,
    lootChoice: null,
    outcome: null,
    phase2OpenedOn: null,
    rolesResolved: false,
    heatChecks: [],
    combination: '5678',
    board: []
  };
}
function defState(){
  const players={};
  PLAYERS.forEach(p=>{ players[p.id]={ steps:{}, rolePrefs:null, role:null }; });
  return {
    version:1,
    challengeStart: CHALLENGE_START,
    getawayClockHours: null,
    crews:{ family: defCrew('family'), inlaws: defCrew('inlaws') },
    alarmTriggeredAt: null,
    players,
    history:[],
    awards:[]
  };
}

/* ============ GITHUB I/O ============ */
let stateSha=null;
let saveInFlight=false;

async function ghGetFile(path){
  const r=await fetch(`${GH_API}/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`,{
    headers:{Authorization:`token ${GHT}`,'Accept':'application/vnd.github+json'}
  });
  if(!r.ok) return null; // 404 does not throw
  const d=await r.json();
  const content=decodeURIComponent(escape(atob(d.content.replace(/\n/g,''))));
  return {content, sha:d.sha, raw:d};
}

async function ghPutFile(path, obj, sha, message){
  const body={
    message: message||('update '+path),
    content: btoa(unescape(encodeURIComponent(JSON.stringify(obj,null,2)))),
    branch:'main'
  };
  if(sha) body.sha=sha;
  let r=await fetch(`${GH_API}/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`,{
    method:'PUT',
    headers:{Authorization:`token ${GHT}`,'Accept':'application/vnd.github+json','Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  if(r.status===409){
    const fresh=await ghGetFile(path);
    if(fresh){
      body.sha=fresh.sha;
      r=await fetch(`${GH_API}/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`,{
        method:'PUT',
        headers:{Authorization:`token ${GHT}`,'Accept':'application/vnd.github+json','Content-Type':'application/json'},
        body: JSON.stringify(body)
      });
    }
  }
  if(!r.ok) throw new Error('GitHub save failed: '+r.status);
  return r.json();
}

async function ghDeleteFile(path, sha, message){
  return fetch(`${GH_API}/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`,{
    method:'DELETE',
    headers:{Authorization:`token ${GHT}`,'Accept':'application/vnd.github+json','Content-Type':'application/json'},
    body: JSON.stringify({message: message||('prune '+path), sha, branch:'main'})
  });
}

async function loadState(){
  const f=await ghGetFile(GH_STATE_PATH);
  if(!f){ stateSha=null; return defState(); }
  stateSha=f.sha;
  try{
    const s=JSON.parse(f.content);
    // guard against a leftover state.json from a previous challenge (different shape) —
    // e.g. Oregon Trail's state has no .crews.family/.crews.inlaws/.players in this shape
    if(!s || !s.crews || !s.crews.family || !s.crews.inlaws || !s.players){
      return defState();
    }
    return s;
  }catch(e){ return defState(); }
}

async function saveState(message){
  if(saveInFlight) return false;
  saveInFlight=true;
  setAdminMsg('SAVING...','');
  try{
    recomputeAll(STATE);
    const res=await ghPutFile(GH_STATE_PATH, STATE, stateSha, message);
    stateSha=res.content.sha;
    render();
    return true;
  }catch(e){
    setAdminMsg('SAVE FAILED: '+e.message,'err');
    return false;
  }finally{
    saveInFlight=false;
  }
}

async function backupNow(){
  const ts=localStamp();
  await ghPutFile(`${GH_BAK_DIR}/${ts}.json`, STATE, null, 'backup '+ts);
  await pruneBackups();
}
async function listBackups(){
  const r=await fetch(`${GH_API}/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_BAK_DIR}`,{
    headers:{Authorization:`token ${GHT}`,'Accept':'application/vnd.github+json'}
  });
  if(!r.ok) return [];
  const list=await r.json();
  return Array.isArray(list)? list.sort((a,b)=>a.name.localeCompare(b.name)) : [];
}
async function pruneBackups(){
  const list=await listBackups();
  if(list.length>GH_BAK_MAX){
    const excess=list.slice(0,list.length-GH_BAK_MAX);
    for(const f of excess){ await ghDeleteFile(f.path,f.sha,'prune '+f.name); }
  }
}
async function restoreBackup(path){
  const f=await ghGetFile(path);
  if(!f) return false;
  STATE=JSON.parse(f.content);
  return saveState('restore from '+path);
}

/* ============ PHASE / GAME ENGINE ============ */
function sumSteps(playerRec){
  return Object.values(playerRec.steps||{}).reduce((s,v)=>s+(Number(v)||0),0);
}
function computePhase(total){
  let cum=0;
  for(let i=0;i<PHASES.length;i++){
    const p=PHASES[i];
    if(i<PHASES.length-1){
      if(total<cum+p.steps) return {phase:i+1, progress: total-cum};
      cum+=p.steps;
    }else{
      return {phase:8, progress: Math.max(0,total-cum)};
    }
  }
}
function resolveRoles(state, ck){
  const crew=state.crews[ck];
  const openedOn=crew.phase2OpenedOn;
  const today=localDate();
  if(!openedOn){ crew.rolesResolved=true; return; }
  const scored=crew.members.map(pid=>{
    const rec=state.players[pid];
    let total=0;
    Object.keys(rec.steps||{}).forEach(date=>{ if(date>=openedOn && date<today) total+=(rec.steps[date]||0); });
    return {pid,total};
  }).sort((a,b)=>b.total-a.total);
  const available=new Set(ROLES);
  scored.forEach(({pid})=>{
    const prefs=state.players[pid].rolePrefs;
    let chosen=null;
    if(prefs && prefs.length){
      for(const r of prefs){ if(available.has(r)){ chosen=r; break; } }
    }
    if(!chosen){ chosen=[...available][0]||null; }
    state.players[pid].role=chosen;
    if(chosen) available.delete(chosen);
  });
  crew.rolesResolved=true;
  pushLog(state, `ROLES ASSIGNED: ${crew.name.toUpperCase()}`);
}
function pushLog(state, text){
  state.history=state.history||[];
  state.history.unshift({ ts: new Date().toISOString(), text });
  state.history=state.history.slice(0,60);
}
function recomputeAll(state){
  ['family','inlaws'].forEach(ck=>{
    const crew=state.crews[ck];
    const total=crew.members.reduce((s,pid)=>s+sumSteps(state.players[pid]),0);
    const prevPhase=crew.currentPhase;
    crew.totalSteps=total;
    const ph=computePhase(total);
    crew.currentPhase=ph.phase;
    crew.phaseProgress=ph.progress;

    if(prevPhase===1 && crew.currentPhase>=2 && !crew.phase2OpenedOn){
      crew.phase2OpenedOn=localDate();
      pushLog(state, `PHASE 2 UNLOCKED: ${crew.name.toUpperCase()} — ${PHASES[1].name.toUpperCase()}`);
    }
    if(prevPhase<3 && crew.currentPhase>=3 && !crew.rolesResolved){
      resolveRoles(state, ck);
    }
    if(prevPhase<8 && crew.currentPhase>=8 && !crew.getawayStartedAt){
      crew.getawayStartedAt=new Date().toISOString(); // precise instant needed for hour countdown — not a calendar date field
      pushLog(state, `ALARM: ${crew.name.toUpperCase()} ENTERS THE GETAWAY`);
      if(!state.alarmTriggeredAt){ state.alarmTriggeredAt=new Date().toISOString(); }
    }
    if(prevPhase!==crew.currentPhase && crew.currentPhase>=2 && crew.currentPhase<=7){
      pushLog(state, `PHASE ${crew.currentPhase} UNLOCKED: ${crew.name.toUpperCase()} — ${PHASES[crew.currentPhase-1].name.toUpperCase()}`);
    }
    if(crew.currentPhase===8 && !crew.outcome){
      const target = crew.lootChoice==='drop'?112500 : crew.lootChoice==='carry'?150000 : null;
      const hrs = crew.getawayStartedAt ? (Date.now()-new Date(crew.getawayStartedAt).getTime())/3600000 : 0;
      const clockHrs = state.getawayClockHours || DEFAULT_GETAWAY_HOURS;
      if(target && crew.phaseProgress>=target){
        crew.outcome='escaped';
        pushLog(state, `${crew.name.toUpperCase()} ESCAPED CLEAN (${crew.lootChoice.toUpperCase()})`);
      }else if(hrs>=clockHrs){
        crew.outcome='captured';
        pushLog(state, `${crew.name.toUpperCase()} CAPTURED — CLOCK RAN OUT`);
      }
    }
  });
}

/* ============ APP STATE ============ */
let STATE=null;
let activeTab='main';
let unlocked={family:false, inlaws:false, admin:false};

async function boot(){
  STATE=await loadState();
  recomputeAll(STATE);
  render();
  setInterval(async ()=>{
    if(saveInFlight) return;
    STATE=await loadState();
    recomputeAll(STATE);
    render();
  },30000);
  setInterval(()=>{
    if(activeTab!=='main' || !STATE || bothResolved()) return;
    if(STATE.crews.family.getawayStartedAt||STATE.crews.inlaws.getawayStartedAt){
      document.getElementById('view').innerHTML=renderMain();
    }
  },1000);
}
function setTab(t){ activeTab=t; document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t)); render(); }

/* ============ RENDER ============ */
function render(){
  if(!STATE) return;
  const alarmEl=document.getElementById('alarmBanner');
  alarmEl.style.display = STATE.alarmTriggeredAt ? 'block':'none';
  const view=document.getElementById('view');
  view.className = activeTab==='main' ? 'vault' : 'ops';
  if(activeTab==='main') view.innerHTML=renderMain();
  else view.innerHTML=renderCrew(activeTab);
}

function bothResolved(){
  return STATE.crews.family.outcome && STATE.crews.inlaws.outcome;
}

function crewCardHTML(ck){
  const crew=STATE.crews[ck];
  const phObj=PHASES[crew.currentPhase-1];
  const pct = crew.currentPhase===8
    ? clamp(100*crew.phaseProgress/((crew.lootChoice==='drop'?112500:150000)),0,100)
    : clamp(100*crew.phaseProgress/phObj.steps,0,100);
  let getawayHTML='';
  if(crew.currentPhase===8 && !crew.outcome && crew.getawayStartedAt){
    const clockHrs=STATE.getawayClockHours||DEFAULT_GETAWAY_HOURS;
    const elapsed=(Date.now()-new Date(crew.getawayStartedAt).getTime())/3600000;
    const remain=Math.max(0,clockHrs-elapsed);
    const hh=Math.floor(remain), mm=Math.floor((remain-hh)*60), ss=Math.floor(((remain-hh)*60-mm)*60);
    const low = remain < 12;
    getawayHTML=`<div class="ck-getaway${low?' low':''}"><div class="gt-lbl">GETAWAY CLOCK</div><div class="gt-clock">${pad(hh)}:${pad(mm)}:${pad(ss)}</div>
      <div class="small">${crew.lootChoice? (crew.lootChoice==='drop'?'DROPPED A QUARTER':'CARRYING IT ALL') : 'AWAITING LOOT CALL'}</div></div>`;
  }
  let outcomeHTML='';
  if(crew.outcome){
    outcomeHTML=`<div class="ck-outcome ${crew.outcome}">${crew.outcome==='escaped'?'ESCAPED CLEAN':'CAPTURED'}</div>`;
  }
  return `<div class="ccard ${ck==='family'?'fam':'inl'}">
    <span class="bracket tl"></span><span class="bracket br"></span>
    <div class="ck-lbl">${esc(crew.name)}</div>
    <div class="ck-phase">PHASE ${crew.currentPhase} OF 8 <span class="decrypt-tag">DECRYPTED</span></div>
    <div class="ck-phname">${esc(phObj.name)}</div>
    <div class="barwrap"><div class="bar" style="width:${pct}%"></div></div>
    <div class="ck-nums"><b>${fmtN(crew.totalSteps)}</b> steps &middot; <b>${fmtMi(crew.totalSteps)}</b> mi</div>
    ${getawayHTML}${outcomeHTML}
  </div>`;
}

function renderMain(){
  if(bothResolved()){
    return renderCaseFile();
  }
  const log=(STATE.history||[]).slice(0,10).map((h,i)=>`<div class="log-e${i===0?' latest':''}"><b>${esc(h.text)}</b><br><span class="ts">${new Date(h.ts).toLocaleString()}</span></div>`).join('') || '<div class="small">No activity logged yet.</div>';
  return `
  <div class="sec">
    <div class="sec-ttl">&gt; THE SCOREBOARD</div>
    <div class="sec-sub">Readable by everyone. This is what the security camera sees.</div>
    <div class="vaultwrap">
      <div class="vaultdoor"><span class="vd-ring"></span><span class="vd-handle"></span></div>
      <div class="vault-cap">TWO CREWS &middot; ONE VAULT &middot; EIGHT PHASES</div>
    </div>
    <div class="crewgrid">${crewCardHTML('family')}${crewCardHTML('inlaws')}</div>
  </div>
  <div class="sec">
    <div class="sec-ttl">&gt; CASE LOG</div>
    ${log}
  </div>`;
}

function renderCaseFile(){
  const awards=(STATE.awards||[]).map(a=>`<div class="cf-exhibit"><b>${esc(a.title)}</b> — ${esc(a.recipient)}<br><span class="small">${esc(a.note)}</span></div>`).join('') || '<div class="small">No awards recorded.</div>';
  function crewBlock(ck){
    const c=STATE.crews[ck];
    const shots=c.members.map(pid=>`<img class="cf-shot" src="${PHOTOS[pid]||''}" alt="${esc(playerMeta(pid).display)}">`).join('');
    return `<div class="cf-crew">
      <div class="cf-name">${esc(c.name)}</div>
      <div class="cf-stamp ${c.outcome}">${c.outcome==='escaped'?'ESCAPED':'CAPTURED'}</div>
      <div class="cf-line">Loot call: ${c.lootChoice==='drop'?'Dropped a quarter':c.lootChoice==='carry'?'Carried it all':'\u2014'}</div>
      <div class="cf-line">${fmtN(c.totalSteps)} steps &middot; ${fmtMi(c.totalSteps)} mi</div>
      <div class="cf-shots">${shots}</div>
    </div>`;
  }
  function boardBlock(ck){
    const c=STATE.crews[ck];
    const board=(c.board||[]).slice().reverse().map(p=>`<div class="board-e"><span class="who">${esc(p.sender)}:</span> ${esc(p.text)}</div>`).join('') || '<div class="small">No transmissions.</div>';
    return `<div class="sec-sub" style="margin-top:10px"><b>${esc(c.name)}</b> &mdash; burner board (evidence)</div><div class="cf-board">${board}</div>`;
  }
  return `
  <div class="sec">
    <div class="stamp">CASE CLOSED</div>
    <div class="casefile">
      <div class="sec-ttl">&gt; VERDICT</div>
      <div class="cf-verdict">${crewBlock('family')}${crewBlock('inlaws')}</div>
      <div class="sec-ttl" style="margin-top:16px;">&gt; AWARDS &amp; EXHIBITS</div>
      ${awards}
      <div class="sec-ttl" style="margin-top:16px;">&gt; INTERCEPTED TRANSMISSIONS</div>
      ${boardBlock('family')}${boardBlock('inlaws')}
    </div>
  </div>`;
}

function individualStatsHTML(pid){
  const rec=STATE.players[pid];
  const days=Object.keys(rec.steps||{}).filter(d=>rec.steps[d]>0);
  const total=sumSteps(rec);
  const avg=days.length? Math.round(total/days.length):0;
  const best=days.length? Math.max(...days.map(d=>rec.steps[d])):0;
  const meta=playerMeta(pid);
  return `<div class="pcard">
    <div class="pp-w"><img class="pp" src="${PHOTOS[pid]||''}" alt="${esc(meta.display)}"></div>
    <div class="p-name">${esc(meta.display)}</div>
    <div class="p-role">${rec.role? 'THE '+rec.role.toUpperCase() : (STATE.crews[crewOf(pid)].rolesResolved? '—' : 'ROLE PENDING')}</div>
    <div class="p-stats">${fmtN(total)} total<br>${fmtN(avg)} avg/day<br>${fmtN(best)} best day<br>${days.length} days logged</div>
  </div>`;
}

function renderCrew(ck){
  const crew=STATE.crews[ck];
  const isUnlocked=unlocked[ck]||unlocked.admin;
  let html=`<div class="opsbar"><span class="ops-dot"></span> OPERATIONS CENTER &middot; LIVE &middot; ${esc(crew.name).toUpperCase()}</div><div class="sec">
    <div class="sec-ttl">&gt; ${esc(crew.name).toUpperCase()} — THE SAFEHOUSE</div>
    <div class="sec-sub">Same data as the scoreboard, different room.</div>`;

  if(!isUnlocked){
    html+=`<div class="gate">
      <div class="gate-lbl">ENTER THE COMBINATION</div>
      <input type="tel" id="combo_${ck}" maxlength="8" placeholder="&bull;&bull;&bull;&bull;">
      <button onclick="tryCombo('${ck}')">[UNLOCK]</button>
      <div class="am" id="comboMsg_${ck}"></div>
      <div class="small" style="margin-top:6px;">Gates what you can do here, not what you can see.</div>
    </div>`;
  }else{
    html+=`<div class="unlocked-tag">&#9632; UNLOCKED</div>`;
    html+=`<div class="crewname-row">
      <input type="text" id="crewNameInput_${ck}" maxlength="24" value="${esc(crew.name)}">
      <button onclick="saveCrewName('${ck}')">SAVE</button>
    </div>`;
  }
  html+='</div>';

  // roster
  html+=`<div class="sec"><div class="sec-ttl">&gt; ROSTER</div><div class="roster">`;
  crew.members.forEach(pid=>{ html+=individualStatsHTML(pid); });
  html+='</div></div>';

  // role draft form (only during phase 2, before resolution, and only if unlocked)
  if(isUnlocked && !crew.rolesResolved){
    html+=`<div class="sec"><div class="sec-ttl">&gt; CLAIM YOUR ROLE</div>
    <div class="sec-sub">Rank your preference. Highest steps in Phase 2 picks first when the phase closes. Locked once assigned.</div>
    <div class="roleform">
      <select id="roleWho_${ck}">${crew.members.map(pid=>`<option value="${pid}">${esc(playerMeta(pid).display)}</option>`).join('')}</select>
      ${[1,2,3,4].map(i=>`<select id="rolePref${i}_${ck}"><option value="">${i===1?'1st':i===2?'2nd':i===3?'3rd':'4th'} choice</option>${ROLES.map(r=>`<option value="${r}">${r}</option>`).join('')}</select>`).join('')}
      <button onclick="submitRolePrefs('${ck}')">[SUBMIT PREFERENCE]</button>
    </div>
    <div class="am" id="roleMsg_${ck}"></div>
    </div>`;
  }

  // heat check stamps
  if((crew.heatChecks||[]).length){
    html+=`<div class="sec"><div class="sec-ttl">&gt; HEAT CHECK STAMPS</div>`;
    crew.heatChecks.forEach(h=>{ html+=`<div class="log-e"><b>${esc(h.text)}</b><br><span class="ts">${esc(h.date)}</span></div>`; });
    html+='</div>';
  }

  // loot call
  if(crew.currentPhase===8){
    html+='<div class="sec"><div class="sec-ttl">&gt; THE LOOT CALL</div>';
    if(crew.lootChoice){
      html+=`<div class="loot-locked-card"><div class="small" style="letter-spacing:2px;color:var(--dim)">CALL LOCKED</div><div class="llc-stamp">${crew.lootChoice==='drop'?'DROPPED A QUARTER':'CARRYING IT ALL'}</div><div class="small">Irreversible. The crew is committed.</div></div>`;
    }else if(isUnlocked){
      html+=`<div class="lootbox"><div class="small">One irreversible call. Any crew member &mdash; first submission locks it for everyone.</div>
      <div class="loot-choices">
        <div class="loot-choice risk" onclick="submitLoot('${ck}','carry')"><div class="lc-name">CARRY IT ALL</div><div class="lc-odds">74<small>%</small></div><div class="lc-sub">150,000 STEPS &middot; ALL OR NOTHING</div></div>
        <div class="loot-choice" onclick="submitLoot('${ck}','drop')"><div class="lc-name">DROP A QUARTER</div><div class="lc-odds">99.7<small>%</small></div><div class="lc-sub">112,500 STEPS &middot; PLAY IT SAFE</div></div>
      </div>
      <div class="loot-lockrow">TAP A CARD TO LOCK THE CALL</div></div>`;
    }else{
      html+=`<div class="lootbox"><div class="small">Decision pending. Unlock the combination to make the call.</div></div>`;
    }
    html+='</div>';
  }

  // burner board
  html+=`<div class="sec"><div class="sec-ttl">&gt; THE BURNER BOARD</div>
  <div class="sec-sub">Assume the line is tapped.</div>
  <div class="burner">
    <div class="burner-status"><span>&#9646;&#9646;&#9646; SIGNAL</span><span>BURNER</span><span>BATT 87%</span></div>
    <div class="board" id="board_${ck}">`;
  const posts=(crew.board||[]).slice().reverse();
  html+= posts.length ? posts.map(p=>`<div class="board-e"><span class="who">${esc(p.sender)}:</span> ${esc(p.text)} <span class="ts">${new Date(p.ts).toLocaleString()}</span></div>`).join('') : '<div class="small">No messages yet.</div>';
  html+='</div></div>';
  if(isUnlocked){
    html+=`<div class="board-form">
      <select id="boardSender_${ck}">${crew.members.map(pid=>`<option value="${esc(playerMeta(pid).display)}">${esc(playerMeta(pid).display)}</option>`).join('')}</select>
      <input type="text" id="boardText_${ck}" maxlength="140" placeholder="message&hellip;">
      <button onclick="postBoard('${ck}')">SEND</button>
    </div>
    <div class="charct">max 140 chars &middot; last 20 kept</div>`;
  }
  html+='</div>';

  return html;
}

/* ============ ACTIONS: CREW PAGE ============ */
function tryCombo(ck){
  const v=document.getElementById('combo_'+ck).value.trim();
  const crew=STATE.crews[ck];
  if(v===crew.combination || v===ADMIN_PIN){
    unlocked[ck]=true;
    render();
  }else{
    document.getElementById('comboMsg_'+ck).className='am err';
    document.getElementById('comboMsg_'+ck).textContent='WRONG COMBINATION';
  }
}
async function saveCrewName(ck){
  const v=document.getElementById('crewNameInput_'+ck).value.trim().slice(0,24);
  if(!v) return;
  STATE.crews[ck].name=v;
  await saveState('crew name: '+ck);
}
async function submitRolePrefs(ck){
  const pid=document.getElementById('roleWho_'+ck).value;
  const prefs=[1,2,3,4].map(i=>document.getElementById('rolePref'+i+'_'+ck).value).filter(Boolean);
  const uniq=[...new Set(prefs)];
  STATE.players[pid].rolePrefs=uniq.length? uniq : null;
  const ok=await saveState('role prefs: '+pid);
  const m=document.getElementById('roleMsg_'+ck);
  if(m){ m.className='am '+(ok?'ok':'err'); m.textContent=ok?'PREFERENCE SAVED':'SAVE FAILED'; }
}
async function submitLoot(ck,choice){
  const crew=STATE.crews[ck];
  if(crew.lootChoice) return; // already locked
  if(!confirm('Lock in "'+(choice==='carry'?'CARRY IT ALL':'DROP A QUARTER')+'"? This is irreversible and locks the call for the whole crew.')) return;
  crew.lootChoice=choice;
  pushLog(STATE, `${crew.name.toUpperCase()} CALLS IT: ${choice==='drop'?'DROP A QUARTER':'CARRY IT ALL'}`);
  await saveState('loot choice: '+ck);
}
async function postBoard(ck){
  const senderEl=document.getElementById('boardSender_'+ck);
  const textEl=document.getElementById('boardText_'+ck);
  const sender=(senderEl.value||'anon').trim().slice(0,20);
  const text=(textEl.value||'').trim().slice(0,140);
  if(!text) return;
  const crew=STATE.crews[ck];
  crew.board=crew.board||[];
  crew.board.push({sender, text, ts:new Date().toISOString()});
  crew.board=crew.board.slice(-20);
  textEl.value='';
  await saveState('board post: '+ck);
}

/* ============ ADMIN PANEL ============ */
function openAdmin(){
  document.getElementById('adminOverlay').classList.add('open');
  renderAdmin();
}
function closeAdmin(){ document.getElementById('adminOverlay').classList.remove('open'); }
function setAdminMsg(text, cls){
  const el=document.getElementById('adminMsg');
  if(el){ el.className='am '+(cls||''); el.textContent=text; }
}
function renderAdmin(){
  const body=document.getElementById('adminBody');
  if(!unlocked.admin){
    body.innerHTML=`<div class="pins">
      <input class="ai" type="tel" id="adminPinInput" placeholder="PIN" maxlength="6" style="max-width:160px;margin:0 auto;">
      <button class="ab" style="max-width:180px;margin:10px auto 0;" onclick="chkAdminPin()">[ENTER]</button>
      <div class="am" id="adminPinMsg"></div>
    </div>`;
    return;
  }
  const playerOpts=PLAYERS.map(p=>`<option value="${p.id}">${p.display} (${p.username})</option>`).join('');
  body.innerHTML=`
  <div class="as">
    <div class="ast">&gt; LOG / EDIT STEPS</div>
    <div class="ar"><label class="al">PLAYER</label><select class="asel" id="admStepPlayer">${playerOpts}</select></div>
    <div class="ar"><label class="al">DATE</label><input class="ai" type="date" id="admStepDate" value="${localDate()}"></div>
    <div class="ar"><label class="al">STEPS</label><input class="ai" type="number" id="admStepVal" min="0" placeholder="e.g. 12500"></div>
    <button class="ab" onclick="admLogSteps()">[SAVE STEPS]</button>
  </div>

  <div class="as">
    <div class="ast">&gt; GETAWAY CLOCK</div>
    <div class="ar"><label class="al">HOURS (90-96 typical, finalize before first crew hits Phase 8)</label>
    <input class="ai" type="number" id="admClockHrs" value="${STATE.getawayClockHours||''}" placeholder="${DEFAULT_GETAWAY_HOURS} (default)"></div>
    <button class="ab" onclick="admSetClock()">[SET CLOCK]</button>
  </div>

  <div class="as">
    <div class="ast">&gt; HEAT CHECK (both crews, same terms)</div>
    <div class="ar"><label class="al">TEXT</label><input class="ai" type="text" id="admHeatText" placeholder="Log 50,000 as a crew today"></div>
    <button class="ab" onclick="admAddHeatCheck()">[STAMP BOTH CREWS]</button>
  </div>

  <div class="as">
    <div class="ast">&gt; AWARDS (post-run case file)</div>
    <div class="ar"><label class="al">TITLE</label><input class="ai" type="text" id="admAwTitle" placeholder="e.g. Fastest Getaway"></div>
    <div class="ar"><label class="al">RECIPIENT</label><input class="ai" type="text" id="admAwRecip" placeholder="e.g. Shania, or 'The Family'"></div>
    <div class="ar"><label class="al">NOTE</label><input class="ai" type="text" id="admAwNote" placeholder="one line"></div>
    <button class="ab" onclick="admAddAward()">[ADD AWARD]</button>
  </div>

  <div class="as">
    <div class="ast">&gt; BACKUPS</div>
    <button class="ab warn" onclick="admBackupNow()">[BACKUP NOW]</button>
    <button class="ab warn" onclick="admListBackups()" style="margin-top:6px;">[LIST BACKUPS]</button>
    <div id="admBakList"></div>
  </div>

  <div class="as">
    <div class="ast">&gt; DANGER ZONE</div>
    <button class="ab danger" onclick="admResetAll()">[RESET ENTIRE CHALLENGE]</button>
  </div>

  <div class="am" id="adminMsg"></div>
  `;
}
function chkAdminPin(){
  const v=document.getElementById('adminPinInput').value;
  if(v===ADMIN_PIN){ unlocked.admin=true; renderAdmin(); }
  else{ document.getElementById('adminPinMsg').className='am err'; document.getElementById('adminPinMsg').textContent='WRONG PIN'; }
}
async function admLogSteps(){
  const pid=document.getElementById('admStepPlayer').value;
  const date=document.getElementById('admStepDate').value;
  const val=Number(document.getElementById('admStepVal').value);
  if(!date || isNaN(val) || val<0){ setAdminMsg('INVALID ENTRY','err'); return; }
  STATE.players[pid].steps=STATE.players[pid].steps||{};
  STATE.players[pid].steps[date]=val;
  const ok=await saveState(`log steps: ${pid} ${date}=${val}`);
  setAdminMsg(ok?'SAVED':'SAVE FAILED', ok?'ok':'err');
  renderAdmin();
}
async function admSetClock(){
  const v=Number(document.getElementById('admClockHrs').value);
  STATE.getawayClockHours = (v>0)? v : null;
  const ok=await saveState('set getaway clock');
  setAdminMsg(ok?'CLOCK SET':'SAVE FAILED', ok?'ok':'err');
}
async function admAddHeatCheck(){
  const text=document.getElementById('admHeatText').value.trim();
  if(!text) return;
  const stamp={text, date:localDate()};
  STATE.crews.family.heatChecks.push(stamp);
  STATE.crews.inlaws.heatChecks.push(stamp);
  const ok=await saveState('heat check');
  setAdminMsg(ok?'STAMPED':'SAVE FAILED', ok?'ok':'err');
}
async function admAddAward(){
  const title=document.getElementById('admAwTitle').value.trim();
  const recipient=document.getElementById('admAwRecip').value.trim();
  const note=document.getElementById('admAwNote').value.trim();
  if(!title||!recipient) return;
  STATE.awards=STATE.awards||[];
  STATE.awards.push({title, recipient, note, ts:new Date().toISOString()});
  const ok=await saveState('award added');
  setAdminMsg(ok?'AWARD ADDED':'SAVE FAILED', ok?'ok':'err');
}
async function admBackupNow(){
  setAdminMsg('BACKING UP...','');
  try{ await backupNow(); setAdminMsg('BACKUP SAVED','ok'); }
  catch(e){ setAdminMsg('BACKUP FAILED: '+e.message,'err'); }
}
async function admListBackups(){
  setAdminMsg('LOADING...','');
  const list=await listBackups();
  const el=document.getElementById('admBakList');
  el.innerHTML=list.slice().reverse().map(f=>`<div class="bak-row"><span>${esc(f.name)}</span><button onclick="admRestore('${f.path}')">RESTORE</button></div>`).join('') || '<div class="small">No backups yet.</div>';
  setAdminMsg('','');
}
async function admRestore(path){
  if(!confirm('Restore from '+path+'? This overwrites live state.')) return;
  setAdminMsg('RESTORING...','');
  const ok=await restoreBackup(path);
  setAdminMsg(ok?'RESTORED':'RESTORE FAILED', ok?'ok':'err');
  renderAdmin();
}
async function admResetAll(){
  if(!confirm('Reset the ENTIRE challenge? This cannot be undone.')) return;
  if(!confirm('Really sure? All steps, roles, boards, and outcomes will be wiped.')) return;
  await backupNow().catch(()=>{});
  STATE=defState();
  const ok=await saveState('RESET challenge');
  setAdminMsg(ok?'CHALLENGE RESET':'RESET FAILED', ok?'ok':'err');
  renderAdmin();
}

/* ============ BOOT ============ */
boot();
</script>
